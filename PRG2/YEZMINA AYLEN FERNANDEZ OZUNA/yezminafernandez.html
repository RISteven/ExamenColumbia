<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="yfstyles.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Registro de Usuario</h1>

            <form id="formulario">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre" required>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" placeholder="Ingrese su apellido" required>

                <label for="correo">Correo:</label>
                <input type="email" id="correo" placeholder="Ingrese su correo" required>

                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono" placeholder="Ingrese su teléfono" required>

                <label for="ciudad">Ciudad:</label>
                <input type="text" id="ciudad" placeholder="Ingrese su ciudad" required>

                <label for="fechaNac">Fecha de nacimiento:</label>
                <input type="date" id="fechaNac" required>

                <button type="submit" id="btnGuardar">Guardar</button>
            </form>
        </div>
    </div>
    <script src="yfscript.js"></script>
    <footer>
        <p> Yezmina Fernandez.</p>
    </footer>
</body>
</html>
