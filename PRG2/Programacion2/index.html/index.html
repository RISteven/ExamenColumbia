<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Store</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <h1>Alex's Store</h1>
        <p>Bienvenido a la tienda de Alex</p>
    </header>
    <main class="contenedor">
        <section class="card">
            <h2>Formulario</h2>
            <h3>Favor complete los siguientes datos</h3>

            <p>Nombre y apellido:
                <input type="text" name="Nombre" id="name" 
            </p>
            <p>Correo electronico:
                <input type="email" name="Correo" id="email" 
            </p>
            <p>Telefono:
                <input type="tel" name="Telefono" id="cell" 
            </p>
            <p>Ciudad:
                <input type="text" name="Ciudad" id="city" 
            </p>
            <p>Fecha de nacimiento (dd/mm/aaaa):
                <input type="text" name="Fecha" id="birth" 
            </p>
            <div class="btn-group">
                <button id="btnAccion" class="btn primario">Guardar</button>
            </div>

            <div class="text-boxes" id="confirmacion"></div>
        </section>
    </main>

    <footer>
        <p>Copyright by Alex Alcaraz</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
