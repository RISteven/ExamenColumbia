<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de minoristas</title>
    <link rel="stylesheet" href="css/brisa_herrero_estilo.css">

</head>
<body>
    <header>
        <h1>Venta de minoristas</h1>
        <h2>los mejores precios del país!</h2>
    </header>

    <main>
    <section>
     <h2>ingrese sus datos para acceder a nuestros precios</h2>
    <form id= "registros">
        <label for="nombre">Nombre y apellido:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
        <br></br>
        <label for="correo electronico">Correo:</label>
        <input type="email" id="correo" name="correo" placeholder="correo@gmail.com" required>
        <br></br>
        <label for="telefono">telefono:</label>
        <input type="text" id="telefono" name="telefono" placeholder="123-456-789" required>
        <br></br>
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad" required>
        <br></br>
        <label for="fecha de nacimiento">fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha" required>
        <br></br>
         <button type="submit">Guardar</button>
        <br></br>
        </form>


    </section>
    </main>


     <footer class="footer">
        <h3>Todos los derechos reservados - 2026</h3>
    </footer>
    
</body>
</html>
