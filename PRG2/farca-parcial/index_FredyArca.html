<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Nova</title>
    <link rel="stylesheet" href="styles/styles_FredyArca.css">
</head>
<body>
    <header>
        <h1>Registro de Clientes</h1>
    </header>
    <div class="separator"></div>

    <div class="container">
    <form id="clientForm">
        <label for="firstName">Nombre:</label>
        <input type="text" id="firstName" name="firstName"><br><br>

        <label for="lastName">Apellido:</label>
        <input type="text" id="lastName" name="lastName"><br><br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" placeholder="juan.perez@example.com"><br><br>

        <label for="phone">Número de Teléfono:</label>
        <input type="tel" id="phone" name="phone" ><br><br>

        <label for="city">Ciudad:</label>
        <input type="text" id="city" name="city"><br><br>

        <label for="dob">Fecha de Nacimiento:</label>
        <input type="date" id="dob" name="dob"><br><br>

        <button type="submit" id="submitBtn">Registrar Cliente</button>
    </form>
    </div>


<div class="separator-footer"></div>
<footer>
    <p>&copy; 2026 Tienda Nova. Todos los derechos reservados.</p>
    <p>Desarrollado por Fredy Arca.</p>
    <p >Universidad Columbia del Paraguay</p>
</footer>

<script src="js/app_FredyArca.js"></script>
</body>
</html>
