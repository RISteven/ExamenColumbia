<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones</title>
    <link rel="stylesheet" href="css/stylesLeilaD.css">
</head>
<body>
    <header class="header">
        <h1>Registro de Clientes</h1>
    </header>
    <form id="formRegistroCliente">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" required placeholder="Escriba su nombre">
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" required placeholder="Escriba su apellido">
        <label for="email">Correo:</label>
        <input type="email" id="email" required placeholder="nombreapellido@gmail.com">
        <label for="telefono">Teléfono:</label>
        <input type="number" id="telefono" required placeholder="Ej: 09XXXXXXXX">
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" required placeholder="Ej: Asuncion">
        <label for="fechanac">Fecha de Nacimiento:</label>
        <input type="date" id="fechanac">
        <button type="submit" class="btn primario">Registrarse</button>
    </form>

    <footer class="footer">
        <p>Leila Duré Insaurralde - Parcial</p>
    </footer>
    <script src="js/scriptLeilaD.js"></script>
</body>
</html>
