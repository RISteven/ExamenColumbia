<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial</title>
    <link rel="stylesheet" href="estilo_pburgos.css" />
</head>
<body>
    <title>Sistema</title>
    <header class="header">
        <h1>Tienda Comercial</h1>
    </header>

    <form id="formRegistro">
        <label>Nombre:</label>
        <input type="text" name="" id="nombre" class="txtInput" required placeholder="Nombre">

        <label>Apellido:</label>
        <input type="text" name="" id="apellido" class="txtInput" required placeholder="Apellido">

        <label>Email:</label>
        <input type="text" name="" id="gmail" class="txtInput" required placeholder="Gmail">

        <label>Telefono:</label>
        <input type="text" name="" id="telefono" class="txtInput" required placeholder="Telefono">

        <label>Ciudad:</label>:</label>
        <input type="text" name="" id="ciudad" class="txtInput" required placeholder="Ciudad">

        <label>Fecha de Nacimiento:</label>:</label>
        <input type="text" name="" id="gmail" class="txt" required placeholder="Gmail">
    </form>

    <section class="card">
        <div class="btn-group">
            <button id="btnGuardar" class="btn guardar">Guardar</button>
        </div>
    </section>

<footer class="footer">
    <p>2026 - Pamela Burgos</p>
    <p>HTML corresponde a la estructura, CSS al estilo y JavaScript a la interacción</p>
</footer>

<script src="script_pburgos.js"></script>
</body>
</html>
