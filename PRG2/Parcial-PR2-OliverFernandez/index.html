<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARCIAL - PR2 - Oliver Fernandez</title>

    <link rel="stylesheet" href="css/styles.css">

    
</head>

<body>

    <header class="header">
        <h1>EMPRESA MINORISTA</h1>
        <p>Venta a minoristas!</p>
    </header>
     
     
     <form id="formRegistro">
        <h2>Registro de clientes interesados:</h2>
        <label>Nombre:</label>
        <input type="text" id="nombre" required placeholder="Nombre">

        <label>Apellido:</label>
        <input type="text" id="apellido" required placeholder="Apellido">

        <label>Ciudad:</label>
        <input type="text" id="ciudad" required placeholder="Ciudad">

        <label>Email:</label>
        <input type="email" id="email" required placeholder="correo@ejemplo.com">

        <label>Telefono:</label>
        <input type="text" id="Telefono" required placeholder="(09XX) XXX-XXX">

        <label>FechaNacimiento:</label>
        <input type="text" id="FechaNacimiento" required placeholder="01/01/0000">

        <button id="btnGuardar" class="btnPrimario">Registrar</button>
    </form>  

    <footer class="footer">
        <p> PARCIAL - PR2 - Oliver Fernandez</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
