<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Formulario de Usuario</h2>

    <form>
        <label>Nombre:</label><br>
        <input type="text" id="nombre y apellido" placeholder="Tu nombre"><br><br>

        <label>Apellido:</label><br>
        <input type="text" id="apellido" placeholder="Tu apellido"><br><br>

        <label>Email:</label><br>
        <input type="email" id="email" placeholder="Tu email"><br><br>

        <label>Telefono:</label><br>
        <input type="tel" id="Telefono" placeholder="Nro de Telefono"><br><br>

        <label>Ciudad:</label><br>
        <input type="text" id="Ciudad" placeholder="Tu Ciudad"><br><br>

        <label>Fecha de Nacimiento:</label><br>
        <input type="date" id="Fecha de Nacimiento" placeholder="Fecha de Nacimiento"><br><br>

        <button type="submit">Registrar Cliente</button>
    </form>

    <script src="app.js"></script>

</body>
</html>
